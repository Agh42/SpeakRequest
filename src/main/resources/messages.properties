deliverable.EVALUATE_OPTIONS.name=Evaluate options
deliverable.EVALUATE_OPTIONS.description=Assess and compare different alternatives against criteria
deliverable.DRAW_FLOWCHART.name=Draw a flowchart
deliverable.DRAW_FLOWCHART.description=Create a visual diagram showing process steps and decision points
deliverable.IDENTIFY_SUCCESS_FACTORS.name=Identify critical success factors
deliverable.IDENTIFY_SUCCESS_FACTORS.description=Determine the key elements necessary for success
deliverable.IDENTIFY_CORE_VALUES.name=Identify core values
deliverable.IDENTIFY_CORE_VALUES.description=Define the fundamental principles guiding decisions and actions
deliverable.EDIT_STATEMENT.name=Edit and/or wordsmith a statement
deliverable.EDIT_STATEMENT.description=Refine and improve the clarity and impact of written text

