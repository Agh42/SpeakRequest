# ========================================
# Meeting Goals
# ========================================
goal.SHARE_INFORMATION.name=Share Information
goal.SHARE_INFORMATION.description=Ensure everyone has the same facts, updates, or context.
goal.ADVANCE_THINKING.name=Advance the Thinking
goal.ADVANCE_THINKING.description=Develop ideas further through discussion, analysis, and reflection.
goal.OBTAIN_INPUT.name=Obtain Input
goal.OBTAIN_INPUT.description=Gather perspectives, feedback, or expertise from participants.
goal.MAKE_DECISIONS.name=Make Decisions
goal.MAKE_DECISIONS.description=Reach agreement or choose a course of action collaboratively.
goal.IMPROVE_COMMUNICATION.name=Improve Communication
goal.IMPROVE_COMMUNICATION.description=Strengthen clarity, understanding, and mutual trust among participants.
goal.BUILD_CAPACITY.name=Build Capacity
goal.BUILD_CAPACITY.description=Develop participants' skills, knowledge, or confidence to act effectively.
goal.BUILD_COMMUNITY.name=Build Community
goal.BUILD_COMMUNITY.description=Foster relationships, connection, and shared purpose within the group.

# ========================================
# Participation Formats
# ========================================
format.STRUCTURED_GO_AROUNDS.name=Structured Go-Arounds
format.STRUCTURED_GO_AROUNDS.description=Everyone contributes in turn, ensuring equal participation and balanced input.
format.PRESENTATIONS_AND_REPORTS.name=Presentations and Reports
format.PRESENTATIONS_AND_REPORTS.description=Individuals or teams share prepared findings or updates with the group.
format.SMALL_GROUPS.name=Small Groups
format.SMALL_GROUPS.description=Participants work in subgroups to explore topics or solve problems collaboratively.
format.LISTING_IDEAS.name=Listing Ideas
format.LISTING_IDEAS.description=The group rapidly generates and records ideas without immediate evaluation.
format.JIGSAW.name=Jigsaw
format.JIGSAW.description=Each subgroup learns part of a topic and teaches it to others, combining knowledge collaboratively.
format.INDIVIDUAL_WRITING.name=Individual Writing
format.INDIVIDUAL_WRITING.description=Participants reflect or respond in writing before sharing or discussing.
format.MULTI_TASKING.name=Multi-Tasking
format.MULTI_TASKING.description=Participants engage in parallel activities contributing to a shared goal or outcome.
format.OPEN_DISCUSSION.name=Open Discussion
format.OPEN_DISCUSSION.description=Participants freely exchange views and reactions in an unstructured conversation.
format.FISHBOWLS.name=Fishbowls
format.FISHBOWLS.description=A small inner group discusses while others observe, then roles switch for reflection and feedback.
format.TRADESHOW.name=Tradeshow
format.TRADESHOW.description=Participants display and explain their work or ideas at stations others visit in rotation.
format.SCRAMBLER.name=Scrambler
format.SCRAMBLER.description=Participants move between tasks, stations, or partners to stimulate diverse perspectives.
format.ROLEPLAYS.name=Roleplays
format.ROLEPLAYS.description=Participants act out scenarios to explore perspectives, behaviors, or problem-solving strategies.

# ========================================
# Decision Rules
# ========================================
decision.UNANIMITY.name=Unanimity
decision.UNANIMITY.description=All participants must fully agree before a decision is made.
decision.GRADIENTS_OF_AGREEMENT.name=Gradients of Agreement
decision.GRADIENTS_OF_AGREEMENT.description=Participants express varying levels of support, revealing nuanced consensus rather than a simple yes/no.
decision.DOT_VOTING.name=Dot Voting
decision.DOT_VOTING.description=Each person allocates a limited number of votes (dots) to indicate preferences or priorities visually.
decision.SUPERMAJORITY.name=Supermajority
decision.SUPERMAJORITY.description=A decision requires a higher-than-simple majority, such as two-thirds or three-quarters agreement.
decision.MAJORITY.name=Majority
decision.MAJORITY.description=The option with more than half of the votes wins.
decision.PLURALITY.name=Plurality
decision.PLURALITY.description=The option with the most votes wins, even if it lacks a majority.
decision.CONSENT.name=Consent
decision.CONSENT.description=A proposal moves forward unless there is a reasoned and paramount objection.
decision.PERSON_IN_CHARGE.name=Person in Charge
decision.PERSON_IN_CHARGE.description=A designated leader makes the final decision after input from others.
decision.COMMISSION.name=Commission
decision.COMMISSION.description=A smaller group or committee is empowered to deliberate and decide on behalf of the whole.
decision.FLIP_A_COIN.name=Flip a Coin
decision.FLIP_A_COIN.description=A neutral random choice is used to decide between equally acceptable or deadlocked options.

